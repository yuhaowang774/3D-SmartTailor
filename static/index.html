<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D-SmartTailor - 3D 人体量体</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft YaHei', sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
h1 {
  text-align: center;
  font-size: 28px;
  padding: 30px 0 10px;
  color: #7c8cf8;
}
.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 20px;
  font-size: 13px;
}
.mode-tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 25px;
}
.mode-tab {
  padding: 12px 28px;
  background: #1a1a2e;
  border: 2px solid #333;
  border-radius: 8px;
  color: #888;
  cursor: pointer;
  font-size: 15px;
  transition: all 0.3s;
}
.mode-tab:hover { border-color: #555; color: #aaa; }
.mode-tab.active {
  background: #7c8cf8;
  border-color: #7c8cf8;
  color: #fff;
}
.mode-tab.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.mode-tab .badge {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  font-size: 10px;
  border-radius: 4px;
  background: #4caf50;
  color: #fff;
}
.mode-tab .badge.offline { background: #f44336; }
.mode-info {
  text-align: center;
  color: #888;
  font-size: 12px;
  margin-bottom: 20px;
  line-height: 1.6;
}
.mode-info a { color: #7c8cf8; text-decoration: none; }
.mode-info a:hover { text-decoration: underline; }
.upload-area {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 30px;
}
.upload-box {
  width: 360px;
  border: 2px dashed #444;
  border-radius: 12px;
  padding: 40px 30px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s;
  position: relative;
}
.upload-box:hover { border-color: #7c8cf8; }
.upload-box.has-file { border-color: #4caf50; border-style: solid; }
.upload-box .file-icon {
  font-size: 48px;
  color: #7c8cf8;
  margin-bottom: 10px;
}
.upload-box .placeholder {
  color: #666;
  font-size: 14px;
}
.upload-box .filename {
  color: #4caf50;
  font-size: 14px;
  margin-top: 8px;
  word-break: break-all;
}
.height-input {
  text-align: center;
  margin-bottom: 20px;
}
.height-input input {
  width: 140px;
  padding: 8px 12px;
  font-size: 16px;
  border: 1px solid #444;
  border-radius: 6px;
  background: #1a1a2e;
  color: #fff;
  text-align: center;
}
.height-input label { margin-right: 10px; color: #999; }
.btn {
  display: block;
  margin: 0 auto 30px;
  padding: 14px 50px;
  font-size: 18px;
  background: #7c8cf8;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.3s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.result-area {
  display: none;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.result-area.show { display: flex; }
.measure-panel {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 20px;
  width: 280px;
}
.measure-panel h3 { color: #7c8cf8; margin-bottom: 15px; }
.measure-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #2a2a3e;
}
.measure-row .label { color: #999; }
.measure-row .value { color: #fff; font-weight: 600; }
.viewer-panel {
  background: #1a1a2e;
  border-radius: 12px;
  width: 560px;
  height: 450px;
  position: relative;
}
#three-canvas { width: 100%; height: 100%; border-radius: 12px; }
.preview-panel {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 20px;
  width: 280px;
}
.preview-panel h3 { color: #7c8cf8; margin-bottom: 10px; }
.preview-panel img {
  max-width: 100%;
  border-radius: 8px;
  display: block;
  margin: 0 auto;
}
.dl-btn {
  display: block;
  margin: 15px auto 0;
  padding: 10px 30px;
  background: #4caf50;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}
.loading {
  text-align: center;
  padding: 40px;
  color: #999;
}
.error {
  text-align: center;
  padding: 20px;
  color: #f44336;
  white-space: pre-wrap;
}
.spinner {
  display: inline-block;
  width: 40px; height: 40px;
  border: 3px solid #333;
  border-top-color: #7c8cf8;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <h1>3D-SmartTailor — 3D 人体量体</h1>
  <p class="subtitle">上传 GLB 文件或单张照片，自动提取 6 项人体尺寸</p>

  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-glb" onclick="switchMode('glb_file')">
      GLB 文件上传 <span class="badge">可用</span>
    </div>
    <div class="mode-tab" id="tab-pifuhd" onclick="switchMode('pifuhd_local')">
      照片重建 (PIFuHD) <span class="badge offline" id="pifuhd-badge">离线</span>
    </div>
  </div>
  <div class="mode-info" id="mode-info"></div>

  <div id="glb-upload-area">
    <div class="upload-area">
      <div class="upload-box" id="upload-glb">
        <input type="file" accept=".glb,.gltf" hidden id="glb-file">
        <div class="file-icon">📁</div>
        <div class="placeholder">点击上传 GLB 文件</div>
        <div class="filename" id="filename-display" style="display:none"></div>
      </div>
    </div>
  </div>

  <div id="image-upload-area" style="display:none">
    <div class="upload-area">
      <div class="upload-box" id="upload-image">
        <input type="file" accept="image/*" hidden id="image-file">
        <div class="file-icon">📸</div>
        <div class="placeholder" id="image-placeholder">点击上传人体照片</div>
        <div class="filename" id="image-filename-display" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="height-input">
    <label>身高 (cm):</label>
    <input type="number" id="height" placeholder="可选, 用于尺度归一化" min="100" max="250" step="0.1">
  </div>

  <button class="btn" id="start-btn" onclick="startMeasure()">开始测量</button>

  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <p style="margin-top:15px" id="loading-text">正在分析...</p>
  </div>

  <div class="error" id="error" style="display:none"></div>

  <div class="result-area" id="result-area">
    <div class="measure-panel" id="measure-panel"></div>
    <div class="viewer-panel">
      <div id="three-canvas"></div>
    </div>
    <div class="preview-panel" id="preview-panel" style="display:none">
      <h3>预览图</h3>
      <img id="preview-image">
    </div>
    <div style="text-align:center;width:100%">
      <button class="dl-btn" id="dl-btn" style="display:none" onclick="downloadGLB()">下载 GLB 模型</button>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let scene, camera, renderer, controls, model;

function init3D() {
  const container = document.getElementById('three-canvas');
  if (!container) return;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.01, 10);
  camera.position.set(0, 0.8, 2.5);
  camera.lookAt(0, 0.5, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.5, 0);
  controls.enableDamping = true;
  controls.update();

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 1.0);
  dl.position.set(1, 2, 2);
  scene.add(dl);
  const dl2 = new THREE.DirectionalLight(0xffffff, 0.4);
  dl2.position.set(-1, 1, -1);
  scene.add(dl2);

  const grid = new THREE.GridHelper(2, 20, 0x444466, 0x222244);
  grid.position.y = -0.9;
  scene.add(grid);

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  if (controls) controls.update();
  if (renderer && scene && camera) renderer.render(scene, camera);
}

window.loadGLB = function(glbBase64) {
  if (model) { scene.remove(model); model = null; }

  const binStr = atob(glbBase64);
  const bytes = new Uint8Array(binStr.length);
  for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);

  const loader = new GLTFLoader();
  loader.parse(bytes.buffer, '', (gltf) => {
    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.7 / maxDim;
    model.scale.setScalar(scale);
    model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
  });
};

window.addEventListener('resize', () => {
  const c = document.getElementById('three-canvas');
  if (c && renderer) {
    camera.aspect = c.clientWidth / c.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(c.clientWidth, c.clientHeight);
  }
});

init3D();
</script>

<script>
let currentMode = 'glb_file';
let glbData = null;

// 模式切换: mode 值与后端 backend_name 一致 (glb_file / pifuhd_local)
window.switchMode = function(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  const tabId = mode === 'glb_file' ? 'tab-glb' : 'tab-pifuhd';
  document.getElementById(tabId).classList.add('active');

  document.getElementById('glb-upload-area').style.display = (mode === 'glb_file') ? 'block' : 'none';
  document.getElementById('image-upload-area').style.display = (mode !== 'glb_file') ? 'block' : 'none';

  const info = document.getElementById('mode-info');
  if (mode === 'glb_file') {
    info.innerHTML = '访问 <a href="https://sam3d.org/zh/sam-3d-body" target="_blank">sam3d.org</a> 上传照片生成 3D 模型，下载 GLB 后在此上传';
  } else if (mode === 'pifuhd_local') {
    info.innerHTML = 'PIFuHD 本地推理：单张照片直接生成 3D 模型 (CPU 模式约需 1 分钟)';
  }
};

// 查询后端可用性
async function checkBackends() {
  try {
    const res = await fetch('/api/backends');
    const data = await res.json();
    data.backends.forEach(b => {
      if (b.name === 'pifuhd_local') {
        const badge = document.getElementById('pifuhd-badge');
        const tab = document.getElementById('tab-pifuhd');
        if (b.available) {
          badge.textContent = '可用';
          badge.classList.remove('offline');
        } else {
          badge.textContent = '离线';
          badge.classList.add('offline');
          tab.classList.add('disabled');
        }
      }
    });
  } catch (e) {
    console.warn('无法查询后端状态:', e);
  }
}

document.getElementById('upload-glb').onclick = () => document.getElementById('glb-file').click();
document.getElementById('glb-file').onchange = e => {
  const f = e.target.files[0];
  if (f) {
    const display = document.getElementById('filename-display');
    display.textContent = '✓ ' + f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
    display.style.display = 'block';
    document.getElementById('upload-glb').querySelector('.placeholder').style.display = 'none';
    document.getElementById('upload-glb').classList.add('has-file');
  }
};

document.getElementById('upload-image').onclick = () => document.getElementById('image-file').click();
document.getElementById('image-file').onchange = e => {
  const f = e.target.files[0];
  if (f) {
    const display = document.getElementById('image-filename-display');
    display.textContent = '✓ ' + f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
    display.style.display = 'block';
    document.getElementById('image-placeholder').style.display = 'none';
    document.getElementById('upload-image').classList.add('has-file');
  }
};

window.startMeasure = async function() {
  const h = document.getElementById('height').value;
  let fd = new FormData();
  let endpoint;

  if (currentMode === 'glb_file') {
    const glbFile = document.getElementById('glb-file').files[0];
    if (!glbFile) { alert('请上传 GLB 文件'); return; }
    const name = glbFile.name.toLowerCase();
    if (!name.endsWith('.glb') && !name.endsWith('.gltf')) { alert('请上传 .glb 或 .gltf 文件'); return; }
    fd.append('glb', glbFile);
    if (h) fd.append('height_cm', h);
    endpoint = '/api/measure_glb';
    document.getElementById('loading-text').textContent = '正在分析 GLB 模型...';
  } else {
    const imgFile = document.getElementById('image-file').files[0];
    if (!imgFile) { alert('请上传图片'); return; }
    fd.append('image', imgFile);
    if (h) fd.append('height_cm', h);
    fd.append('backend', currentMode);  // currentMode === 'pifuhd_local'
    endpoint = '/api/measure_image';
    document.getElementById('loading-text').textContent = '正在重建 3D 模型 (可能需要 1-3 分钟)...';
  }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result-area').classList.remove('show');
  document.getElementById('start-btn').disabled = true;

  try {
    const res = await fetch(endpoint, { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Unknown error');

    const m = data.measurements;
    document.getElementById('measure-panel').innerHTML = `
      <h3>测量结果</h3>
      <div class="measure-row"><span class="label">胸围</span><span class="value">${m.chest_cm || '-'} cm</span></div>
      <div class="measure-row"><span class="label">腰围</span><span class="value">${m.waist_cm || '-'} cm</span></div>
      <div class="measure-row"><span class="label">臀围</span><span class="value">${m.hip_cm || '-'} cm</span></div>
      <div class="measure-row"><span class="label">肩宽</span><span class="value">${m.shoulder_width_cm || '-'} cm</span></div>
      <div class="measure-row"><span class="label">袖长</span><span class="value">${m.sleeve_length_cm || '-'} cm</span></div>
      <div class="measure-row"><span class="label">裤长</span><span class="value">${m.pants_length_cm || '-'} cm</span></div>
      <div style="margin-top:12px;font-size:12px;color:#666">
        后端: ${data.backend || '-'}<br>
        顶点数: ${data.n_vertices || '-'} | 面数: ${data.n_faces || '-'}<br>
        耗时: ${data.processing_time_s || '-'} s
      </div>
    `;

    if (data.glb_base64) {
      glbData = data.glb_base64;
      window.loadGLB(data.glb_base64);
      document.getElementById('dl-btn').style.display = 'block';
    }

    if (data.preview) {
      document.getElementById('preview-image').src = 'data:image/png;base64,' + data.preview;
      document.getElementById('preview-panel').style.display = 'block';
    } else {
      document.getElementById('preview-panel').style.display = 'none';
    }

    document.getElementById('result-area').classList.add('show');
  } catch (err) {
    document.getElementById('error').textContent = '处理失败: ' + err.message;
    document.getElementById('error').style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('start-btn').disabled = false;
  }
};

window.downloadGLB = function() {
  if (!glbData) return;
  const byteChars = atob(glbData);
  const bytes = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'model/gltf-binary' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'body_model.glb';
  a.click();
  URL.revokeObjectURL(url);
};

checkBackends();
</script>

</body>
</html>

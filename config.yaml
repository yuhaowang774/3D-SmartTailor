# 3D-SmartTailor 配置 — 多后端 3D 人体量体

# ===== 3D 人体重建 =====
reconstruction:
  # 后端选择:
  #   'glb_file':    GLB 文件上传 (默认, 即开即用)
  #   'pifuhd_local': PIFuHD 本地推理 (单张照片 → 3D mesh, 需 GPU + 模型)
  backend: "glb_file"

  # --- PIFuHD 本地后端 ---
  pifuhd_local:
    # 预训练模型路径 (运行 scripts/download_trained_model.sh 后自动下载)
    checkpoint_path: "external/pifuhd/checkpoints/pifuhd.pt"
    # 推理设备: 'cuda' (推荐, 需 8GB+ 显存) 或 'cpu' (非常慢)
    device: "cuda"
    # 输出分辨率 (512 默认, 越高越精细但越慢)
    resolution: 512

# ===== 输入预处理 =====
input:
  target_long_side: 1024
  min_resolution: 512

# ===== 输出 =====
output:
  render_mesh: true
  render_views: true
  export_glb: true

# ===== 设备 =====
device: "cuda"
gpu_id: 0


